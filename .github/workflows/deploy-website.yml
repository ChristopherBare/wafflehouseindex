name: Deploy Website

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'whi_flutter/**'
      - 'terraform-website/**'
      - '.github/workflows/deploy-website.yml'

jobs:
  terraform:
    name: Terraform (Website Infrastructure)
    runs-on: ubuntu-latest
    outputs:
      bucket_name: ${{ steps.terraform-output.outputs.bucket_name }}
      cloudfront_distribution_id: ${{ steps.terraform-output.outputs.cloudfront_distribution_id }}
      cloudfront_domain: ${{ steps.terraform-output.outputs.cloudfront_domain }}
      dev_path_uuid: ${{ steps.terraform-output.outputs.dev_path_uuid }}
      website_url: ${{ steps.terraform-output.outputs.website_url }}
      custom_domains: ${{ steps.terraform-output.outputs.custom_domains }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: |
          cd terraform-website
          terraform init -input=false

      - name: Terraform Apply
        run: |
          cd terraform-website
          terraform apply -auto-approve -input=false \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Terraform Output
        id: terraform-output
        run: |
          cd terraform-website
          BUCKET_NAME=$(terraform output -raw website_bucket_name)
          CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
          CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_distribution_domain)
          DEV_PATH_UUID=$(terraform output -raw dev_path_uuid)
          WEBSITE_URL=$(terraform output -raw website_url_cloudfront_domain)
          CUSTOM_DOMAINS=$(terraform output -json custom_domains)

          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT
          echo "dev_path_uuid=$DEV_PATH_UUID" >> $GITHUB_OUTPUT
          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          echo "custom_domains=$CUSTOM_DOMAINS" >> $GITHUB_OUTPUT

  resolve-backend-url:
    name: Resolve Backend API URL
    runs-on: ubuntu-latest
    outputs:
      cloudfront_url: ${{ steps.resolve-url.outputs.cloudfront_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve CloudFront URL
        id: resolve-url
        run: |
          # Try to get it from the backend terraform state
          cd terraform
          terraform init -input=false 2>/dev/null || true
          CLOUDFRONT_URL=$(terraform output -raw cloudfront_url 2>/dev/null || true)

          # Fallback to a default if not found (matching config.dart)
          if [ -z "$CLOUDFRONT_URL" ]; then
            CLOUDFRONT_URL="https://d36k8qx15f2s6e.cloudfront.net"
          fi

          echo "cloudfront_url=$CLOUDFRONT_URL" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    name: Build and Deploy (Minimal Web)
    needs: [terraform, resolve-backend-url]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          cache: true

      - name: Update API Configuration
        run: |
          cd whi_flutter
          cat > lib/config.dart << 'EOF'
          /// API Configuration for Waffle House Index
          ///
          /// Auto-generated by GitHub Actions
          class ApiConfig {
            static const bool useProduction = true;
            static const bool testPremiumEnabled = false;
            static const String cloudfrontUrl = "${{ needs.resolve-backend-url.outputs.cloudfront_url }}";
            static const String localUrlAndroid = "http://10.0.2.2:8000";
            static const String localUrlDesktop = "http://localhost:8000";
            static const String localUrlIOS = "http://localhost:8000";
            static const String premiumMonthlyProductId = "whi_premium_monthly";
            static const String premiumAnnualProductId = "whi_premium_annual";
            static const Set<String> premiumProductIds = {
              premiumMonthlyProductId,
              premiumAnnualProductId,
            };
            static String getApiBaseUrl({required bool isAndroid, required bool isIOS, required bool isDesktop}) {
              if (useProduction) return cloudfrontUrl;
              if (isAndroid) return localUrlAndroid;
              if (isIOS) return localUrlIOS;
              return localUrlDesktop;
            }
          }
          EOF

      - name: Get Dependencies
        run: |
          cd whi_flutter
          flutter pub get

      - name: Build Flutter Web (Minimal)
        run: |
          cd whi_flutter
          flutter build web --release --dart-define=MINIMAL_WEB=true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Production deploy (master): sync to bucket root
      - name: Deploy to S3 (Master Branch)
        if: github.ref == 'refs/heads/master'
        run: |
          aws s3 sync whi_flutter/build/web/ s3://${{ needs.terraform.outputs.bucket_name }}/ --delete --exact-timestamps

      - name: Invalidate CloudFront Cache (Master Branch)
        if: github.ref == 'refs/heads/master'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_distribution_id }} \
            --paths "/*"

      # Development deploy (develop): sync to <uuid>/dev/ prefix
      - name: Deploy to S3 (Develop Branch)
        if: github.ref == 'refs/heads/develop'
        run: |
          PREFIX="${{ needs.terraform.outputs.dev_path_uuid }}/dev/"
          aws s3 sync whi_flutter/build/web/ "s3://${{ needs.terraform.outputs.bucket_name }}/${PREFIX}" --delete --exact-timestamps

      - name: Invalidate CloudFront Cache (Develop Branch)
        if: github.ref == 'refs/heads/develop'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_distribution_id }} \
            --paths "/${{ needs.terraform.outputs.dev_path_uuid }}/dev/*"

      - name: Post Deploy Summary
        shell: bash
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "## ✅ Production Website Deployment" >> "$GITHUB_STEP_SUMMARY"
            echo "**URL**: ${{ needs.terraform.outputs.website_url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🚀 Develop Website Deployment" >> "$GITHUB_STEP_SUMMARY"
            echo "**Preview URL**: https://${{ needs.terraform.outputs.cloudfront_domain }}/${{ needs.terraform.outputs.dev_path_uuid }}/dev/" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**Bucket**: \`${{ needs.terraform.outputs.bucket_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**CloudFront ID**: \`${{ needs.terraform.outputs.cloudfront_distribution_id }}\`" >> "$GITHUB_STEP_SUMMARY"
